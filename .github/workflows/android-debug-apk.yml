name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: android-exporter
        run: gradle assembleDebug

      - name: Rename APK
        run: cp android-exporter/app/build/outputs/apk/debug/app-debug.apk health-connect-garmin-exporter-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: health-connect-garmin-exporter-debug-apk
          path: health-connect-garmin-exporter-debug.apk

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-apk
          name: Development APK
          body: |
            Development build for sideload testing.

            Android may ask you to allow installing unknown apps before installing this APK.
          files: health-connect-garmin-exporter-debug.apk
          prerelease: true
